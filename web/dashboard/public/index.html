<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="MeowTea Dashboard" />
    <title>MeowTea Dashboard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .markdown-content { line-height: 1.6; }
      .markdown-content p { margin: 0.5em 0; }
      .markdown-content h1, .markdown-content h2, .markdown-content h3, .markdown-content h4 { margin: 1em 0 0.5em 0; font-weight: 600; }
      .markdown-content h1 { font-size: 1.5em; }
      .markdown-content h2 { font-size: 1.3em; }
      .markdown-content h3 { font-size: 1.1em; }
      .markdown-content ul, .markdown-content ol { margin: 0.5em 0; padding-left: 1.5em; }
      .markdown-content li { margin: 0.25em 0; }
      .markdown-content code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-family: 'Consolas', 'Monaco', monospace; font-size: 0.9em; }
      .markdown-content pre { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 0.5em 0; }
      .markdown-content pre code { background: none; padding: 0; }
      .markdown-content blockquote { border-left: 3px solid #00d9ff; padding-left: 12px; margin: 0.5em 0; color: #aaa; }
      .markdown-content a { color: #00d9ff; text-decoration: none; }
      .markdown-content a:hover { text-decoration: underline; }
      .markdown-content table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
      .markdown-content th, .markdown-content td { border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; text-align: left; }
      .markdown-content th { background: rgba(0,0,0,0.2); }
      .markdown-content hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1em 0; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
